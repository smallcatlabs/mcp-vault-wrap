name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mcp-vault-wrap dist/mcp-vault-wrap
          cd dist
          tar czf mcp-vault-wrap-${{ matrix.target }}.tar.gz mcp-vault-wrap
          shasum -a 256 mcp-vault-wrap-${{ matrix.target }}.tar.gz > mcp-vault-wrap-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-vault-wrap-${{ matrix.target }}
          path: dist/mcp-vault-wrap-${{ matrix.target }}.tar.gz*

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          find . -name "*.cdx.json" -o -name "bom.json" | head -5

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            *.cdx.json
            bom.json
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build, audit, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          cp artifacts/mcp-vault-wrap-aarch64-apple-darwin/* release/
          cp artifacts/mcp-vault-wrap-x86_64-apple-darwin/* release/

          # SBOM (filename varies by cargo-cyclonedx version)
          find artifacts/sbom/ -type f 2>/dev/null | head -10
          cp artifacts/sbom/*.cdx.json release/mcp-vault-wrap-sbom.cdx.json 2>/dev/null \
            || cp artifacts/sbom/bom.json release/mcp-vault-wrap-sbom.cdx.json 2>/dev/null \
            || echo "Warning: SBOM not found in artifacts"

          # Combined checksums file
          cd release
          cat *.sha256 > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/mcp-vault-wrap-aarch64-apple-darwin.tar.gz
            release/mcp-vault-wrap-aarch64-apple-darwin.tar.gz.sha256
            release/mcp-vault-wrap-x86_64-apple-darwin.tar.gz
            release/mcp-vault-wrap-x86_64-apple-darwin.tar.gz.sha256
            release/checksums-sha256.txt
            release/mcp-vault-wrap-sbom.cdx.json
